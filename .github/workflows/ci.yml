name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ '**' ]  # Run on all branches for early feedback

# Prevent concurrent runs on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      if: success()
      with:
        file: ./coverage.out
        fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v1.64.8
        args: --timeout=5m

  verify-gcp:
    name: Verify GCP Integration
    runs-on: ubuntu-latest
    # Only run if GCP secrets are available (skip on forks)
    if: |
      (github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push') &&
      github.repository == 'Mawar2/Kaimi'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Verify Vertex AI API is enabled
      run: |
        gcloud services list \
          --enabled \
          --filter="name:aiplatform.googleapis.com" \
          --format="value(name)" \
          | grep -q "aiplatform.googleapis.com" \
          || (echo "::error::Vertex AI API is not enabled" && exit 1)

    - name: Verify Secret Manager access
      run: |
        gcloud secrets describe samgov-api-key \
          --project=${{ secrets.GCP_PROJECT_ID }} \
          || (echo "::warning::samgov-api-key secret not found or not accessible" && exit 0)

    - name: Test service account permissions
      run: |
        echo "Testing IAM permissions..."
        gcloud projects get-iam-policy ${{ secrets.GCP_PROJECT_ID }} \
          --flatten="bindings[].members" \
          --filter="bindings.members:serviceAccount" \
          --format="table(bindings.role)" \
          | grep -E "(aiplatform|secretmanager)" \
          || echo "::warning::Service account may be missing required roles"

  verify-acceptance-criteria:
    name: Verify Acceptance Criteria
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - name: Check PR references an issue
      uses: actions/github-script@v7
      with:
        script: |
          const prBody = context.payload.pull_request.body || '';
          const prTitle = context.payload.pull_request.title || '';
          const branchName = context.payload.pull_request.head.ref || '';

          // Check for issue reference in title, body, or branch name
          // Formats: #1, Fixes #1, Close #1, branch: 12_feature_name
          const issueInTextPattern = /#\d+/;
          const issueInBranchPattern = /^\d+_/;

          const hasIssueInText = issueInTextPattern.test(prBody) || issueInTextPattern.test(prTitle);
          const hasIssueInBranch = issueInBranchPattern.test(branchName);

          if (!hasIssueInText && !hasIssueInBranch) {
            core.setFailed(
              'PR must reference a GitHub Issue.\n' +
              'Include "#N" in title/body or use branch format "N_feature_name".\n' +
              'See WORKFLOW.md for requirements.'
            );
          } else {
            if (hasIssueInBranch) {
              const ticketNum = branchName.match(/^(\d+)_/)[1];
              core.info(`✓ PR linked to ticket #${ticketNum} (from branch name)`);
            } else {
              core.info('✓ PR references an issue in title or body');
            }
          }

  all-checks-pass:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [test, lint, verify-gcp, verify-acceptance-criteria]
    if: always()

    steps:
    - name: Check all required jobs succeeded
      run: |
        # Test and lint are always required
        if [[ "${{ needs.test.result }}" != "success" ]]; then
          echo "::error::Tests failed"
          exit 1
        fi

        if [[ "${{ needs.lint.result }}" != "success" ]]; then
          echo "::error::Linting failed"
          exit 1
        fi

        # verify-gcp can be skipped (on forks or missing secrets) but not failed
        if [[ "${{ needs.verify-gcp.result }}" == "failure" ]]; then
          echo "::error::GCP verification failed"
          exit 1
        fi

        # verify-acceptance-criteria can be skipped (on direct push) but not failed
        if [[ "${{ needs.verify-acceptance-criteria.result }}" == "failure" ]]; then
          echo "::error::Acceptance criteria verification failed"
          exit 1
        fi

        echo "✓ All required checks passed!"
