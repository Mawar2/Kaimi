<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kaimi Desktop</title>
    <style>
      /* Minimal, intentionally un-styled scaffold (issue #138). Full design
         system parity is #139. Fonts stay on the system stack for now. */
      :root { --navy: #0A1B3D; --ink: #0A1B3D; --muted: #5A6B86; --line: rgba(16,30,60,0.08); --bg: #FBFCFE; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: var(--ink); background: var(--bg); }
      header { background: var(--navy); color: #fff; padding: 12px 20px; display: flex; align-items: baseline; gap: 12px; }
      header .title { font-weight: 700; font-size: 16px; }
      header .sub { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #94A3BE; }
      main { padding: 20px; }
      .storepath { font-size: 12px; color: var(--muted); margin-bottom: 16px; word-break: break-all; }
      table { border-collapse: collapse; width: 100%; background: #fff; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
      th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--line); font-size: 13px; }
      th { background: #F4F7FC; color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
      tr:last-child td { border-bottom: none; }
      .mono { font-family: "IBM Plex Mono", ui-monospace, "Cascadia Mono", monospace; font-size: 12px; color: var(--muted); }
      .deadline-soon { color: #DC2626; font-weight: 700; }
      .empty { padding: 48px 20px; text-align: center; color: var(--muted); }
      .error { padding: 16px; color: #DC2626; }
    </style>
  </head>
  <body>
    <header>
      <span class="title">Kaimi Desktop</span>
      <span class="sub">The Seeker</span>
    </header>
    <main id="app"><p class="empty">Loading your local queue…</p></main>
    <script src="app.js"></script>
  </body>
</html>
