version: "2"
run:
  tests: true
linters:
  enable:
    - gocritic
    - misspell
    - revive
  settings:
    gocritic:
      disabled-checks:
        - unnecessaryBlock
      enabled-tags:
        - diagnostic
        - style
        - performance
    revive:
      rules:
        - name: exported
          severity: warning
          disabled: false
        - name: package-comments
          severity: warning
          disabled: false
  exclusions:
    generated: lax
    rules:
      # SA5011 is a false positive with t.Fatal in tests (the nil branch
      # halts the goroutine). Keep it active in non-test code.
      - path: '_test\.go'
        linters:
          - staticcheck
        text: 'SA5011'
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/Mawar2/Kaimi
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
