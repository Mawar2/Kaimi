version: "2"
run:
  tests: true
linters:
  enable:
    - gocritic
    - misspell
    - revive
  settings:
    gocritic:
      disabled-checks:
        - unnecessaryBlock
      enabled-tags:
        - diagnostic
        - style
        - performance
    revive:
      rules:
        - name: exported
          severity: warning
          disabled: false
        - name: package-comments
          severity: warning
          disabled: false
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/Mawar2/Kaimi
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
